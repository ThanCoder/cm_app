name: cm_app
description: "Channel Myanmar WebSoup"
publish_to: "none" # Remove this line if you wish to publish to pub.dev
version: 2.4.5
repository: https://github.com/ThanCoder/cm_app

environment:
  sdk: ^3.8.1

dependencies:
  cupertino_icons: ^1.0.9
  expandable_text: ^2.3.0
  flutter:
    sdk: flutter
  provider: ^6.1.5
  flutter_html: ^3.0.0
  t_client: ^0.3.0
  than_pkg: ^5.0.0
  t_widgets: ^2.4.0
  flutter_markdown_plus: ^1.0.7
  yaml: ^3.1.3
  dart_core_extensions: ^0.1.1
  t_html_parser: ^1.5.0
  flutter_bloc: ^9.1.1
  cf_lite: ^0.1.0
  crypto: ^3.0.7

dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  # dart run change_app_package_name:main [com.new.package.name]
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  # dart run flutter_launcher_icons
  android: "launcher_icon"
  image_path: "assets/logo_2.jpg"
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/lang/
    - assets/test/
    - CHANGELOG.md
    - README.md
    - pubspec.yaml
